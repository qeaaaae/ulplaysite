services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ulplay_app
    volumes:
      - .:/var/www/html
      - ulplay_vendor:/var/www/html/vendor
      - ulplay_node_modules:/var/www/html/node_modules
      - ulplay_storage:/var/www/html/storage
    networks:
      - ulplay_network
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: ulplay_nginx
    ports:
      - "80:80"
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ulplay_network

  mysql:
    image: mysql:8.0
    container_name: ulplay_mysql
    environment:
      MYSQL_DATABASE: ulplay
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ulplay
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ulplay_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  ulplay_vendor:
  ulplay_node_modules:
  ulplay_storage:

networks:
  ulplay_network:
    driver: bridge
