services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: ulplay_app
    working_dir: /var/www/html
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ulplay
      DB_USERNAME: ulplay
      DB_PASSWORD: password
    volumes:
      - ulplay_storage:/var/www/html/storage
      - ulplay_public:/var/www/html/public:ro
    networks:
      - ulplay_network
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: ulplay_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ulplay_public:/var/www/html/public:ro
      - ulplay_storage:/var/www/html/storage:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ./docker/nginx/ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ./docker/nginx/prod-http.conf:/etc/nginx/conf.d/prod-http.conf:ro
      - ./docker/nginx/prod-https.conf:/etc/nginx/conf.d/prod-https.conf:ro
    depends_on:
      - app
    networks:
      - ulplay_network

  certbot:
    image: certbot/certbot:latest
    container_name: ulplay_certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: ["sh", "-c", "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"]
    depends_on:
      - nginx
    networks:
      - ulplay_network

  mysql:
    image: mysql:8.0
    container_name: ulplay_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ulplay
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ulplay
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ulplay_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  ulplay_storage:
  ulplay_public:
  letsencrypt:
  certbot_www:

networks:
  ulplay_network:
    driver: bridge
