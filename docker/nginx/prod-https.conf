server {
    listen 443 ssl http2;
    server_name ulplay.com www.ulplay.com;

    root /var/www/html/public;
    index index.php;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/www.ulplay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.ulplay.com/privkey.pem;

    # TLS settings (safe defaults)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
    add_header X-Frame-Options "DENY" always;

    server_tokens off;
    client_max_body_size 20m;

    location / {
        limit_conn ulplay_conn 20;
        limit_req zone=ulplay_dynamic burst=8;

        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        limit_conn ulplay_conn 20;
        limit_req zone=ulplay_dynamic burst=8;

        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
