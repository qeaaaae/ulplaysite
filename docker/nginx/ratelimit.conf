##
# Rate limiting (http context)
#
# Notes:
# - Static files are not limited here; only dynamic requests are limited in server configs.
# - Tune rates/bursts depending on traffic patterns.
##

# Limit requests per IP for dynamic endpoints
# Ужесточаем лимиты против F5/спама.
# Идея: нормальная навигация (несколько запросов в секунду) проходит,
# но серия резких рефрешей начинает получать 429/503.
limit_req_zone $binary_remote_addr zone=ulplay_dynamic:10m rate=2r/s;

# Limit concurrent connections per IP (helps slowloris-ish patterns)
limit_conn_zone $binary_remote_addr zone=ulplay_conn:10m;

